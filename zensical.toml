[project]
site_name = "SPDC Coincidence Analysis"
site_description = "Analytical derivation of coincidence probabilities for TMSV states with bucket detectors"
site_author = "Nico Sieber"
repo_url = "https://github.com/nicosieber/spdc-coincidence-analysis"

extra_css = ["stylesheets/extra.css"]
extra_javascript = [
  "js/mathjax.js",
  "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js",
  "js/home.js"
 
]
site_url = "https://nicosieber.github.io/spdc-coincidence-analysis"

nav = [
  { "Home" = "index.md" },
  { "Main derivation" = [
    { "Experimental setup" = "theory/experimental_setup.md" },
    { "Simplified example" = "theory/simplified_example.md" },
    { "POVM" = "theory/povm.md" },
    { "TMSV" = "theory/tmsv.md" },
    {"Derivation of the coincidence probabiliy" = "theory/cc_derivation.md"}
  ]},
  { "Additional concepts, identities and derivations" = [
    { "Overview" = "concepts_and_foundations/overview.md" },
    { "Coherent states" = "concepts_and_foundations/coherent_states.md" },
    { "Conjugation of operators" = "concepts_and_foundations/conjugation_operators.md" },
    { "Determinant relations" = "concepts_and_foundations/determinant_relations.md" },
    { "Matrix properties" = "concepts_and_foundations/matrix_properties.md" },
    { "Operator relations" = "concepts_and_foundations/operator_relations.md" },
    { "POVM as number operator" = "concepts_and_foundations/povm_number_operator.md" }
  ]}
]

[project.theme]
variant = "classic"
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "content.code.copy"
]

[project.theme.palette]
scheme = "slate"
primary = "lime"
accent = "lime"

[project.markdown_extensions]
footnotes = {}
"pymdownx.arithmatex" = { generic = true }
"pymdownx.highlight" = {}
"pymdownx.superfences" = {}
admonition = {}
toc = { permalink = true }

[project.plugins.search]

#[project.plugins.mkdocstrings.handlers.python]
#paths = ["src"]

# NOTE:
# Your mkdocs-bibtex config below is probably not supported reliably by Zensical yet.
# Keep using mkdocs.yml + Material if bibliography citations are critical right now.
#
# [project.plugins.bibtex]
# bib_file = "refs.bib"
# csl_file = "ieee.csl"
# csl_file_encoding = "utf-8"

[project.extra]
# Zensical/MkDocs-style arbitrary template data can go here.
# The old `extra.social` may not behave the same as Material for MkDocs.

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/nicosieber"